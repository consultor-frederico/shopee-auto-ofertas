name: Shopee Auto Bot

on:
  schedule:
    # Rodar 3 vezes ao dia (Horário de Brasília UTC-3)
    # 11:30 UTC = 08:30 Brasília (Manhã)
    # 16:00 UTC = 13:00 Brasília (Tarde)
    # 22:30 UTC = 19:30 Brasília (Noite)
    - cron: '30 11 * * *'
    - cron: '0 16 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar Robô
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_shopee.py

      - name: Salvar Memória e Resultados
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "ShopeeBot"
          # Adicionamos todos os arquivos que o seu script Python gera/atualiza
          git add integracao_shopee.csv historico_completo.json
          git commit -m "🤖 5 Novas Ofertas: $(date +'%d/%m/%Y %H:%M')" || exit 0
          git push
